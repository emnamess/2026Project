services:
  postgres:
    image: postgres:16-alpine
    container_name: artisan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: artisan_db
      POSTGRES_USER: artisan_user
      POSTGRES_PASSWORD: artisan_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artisan_user -d artisan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: artisan_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
